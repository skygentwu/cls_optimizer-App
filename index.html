<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      Content-Security-Policy（纵深防御）。
      注意：script-src 暂含 'unsafe-inline'/'unsafe-eval' 是为兼容 Vite 开发期 HMR；
      生产构建建议收紧为 script-src 'self'。connect-src 放开本机/模拟器与 https 以支持可配置后端地址。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:* http://10.0.2.2:* https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#1890ff" />
    <title>CLS Optimizer - 氯碱产品组合优化</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
